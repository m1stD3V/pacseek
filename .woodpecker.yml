# Codeberg CI (Woodpecker). Builds on Arch because pacseek links libalpm,
# which only ships there; the FTXUI pin is fetched by CMake itself.
when:
  - event: [push, pull_request, tag]

steps:
  # get.sh is piped into a shell on other people's machines, so a broken push
  # breaks their install, not just our build. Lint it before anything else.
  lint-installers:
    image: archlinux:latest
    commands:
      - pacman -Syu --noconfirm --needed shellcheck
      - shellcheck -s sh get.sh
      - shellcheck -s bash install.sh

  build-and-test:
    image: archlinux:latest
    commands:
      - pacman -Syu --noconfirm --needed base-devel cmake git nlohmann-json
      - cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
      - cmake --build build -j$(nproc)
      - ctest --test-dir build --output-on-failure
